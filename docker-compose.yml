name: sub-hdc

services:
  mariadb:
    image: mariadb:10.6
    container_name: sub_hdc_db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD:-112233}
      MARIADB_DATABASE: ${DB_DATABASE:-sub_hdc}
      TZ: Asia/Bangkok
    ports:
      - "${DB_PUBLISHED_PORT:-3308}:3306"
    volumes:
      - sub_hdc_mariadb_data:/var/lib/mysql
      - ./table:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -p\"$${MARIADB_ROOT_PASSWORD}\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - sub_hdc_net

  webapp:
    build:
      context: ./webapp
      dockerfile: Dockerfile
    container_name: sub_hdc_web
    restart: unless-stopped
    env_file:
      - ./webapp/.env
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      NODE_ENV: production
      TZ: Asia/Bangkok
    ports:
      - "${WEB_PORT:-80}:3000"
    volumes:
      - ./webapp/tmp:/app/tmp
    depends_on:
      mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/login').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - sub_hdc_net

volumes:
  sub_hdc_mariadb_data:

networks:
  sub_hdc_net:
    driver: bridge
