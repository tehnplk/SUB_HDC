name: sub-hdc

services:
  mariadb:
    image: mariadb:10.6
    container_name: sub_hdc_db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: "112233"
      MARIADB_DATABASE: sub_hdc
      TZ: Asia/Bangkok
    ports:
      - "3308:3306"
    volumes:
      - sub_hdc_mariadb_data:/var/lib/mysql
      - ./table:/docker-entrypoint-initdb.d:ro
      - ./my.cnf:/etc/mysql/conf.d/custom.cnf:ro

  webapp:
    build:
      context: ./webapp
      dockerfile: Dockerfile
    container_name: sub_hdc_web
    restart: unless-stopped
    ports:
      - "80:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ./webapp/.env
    environment:
      TZ: Asia/Bangkok
    command: sh -c "node lib/run_migrations.js && npm run start"
    volumes:
      - ./webapp/tmp:/app/tmp
      - ./table_update:/app/table_update:ro

  sync:
    build:
      context: ./sync
      dockerfile: Dockerfile
    container_name: sub_hdc_sync
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ./webapp/.env
    environment:
      TZ: Asia/Bangkok
      SYNC_TARGET_URL: "https://subhdc.plkhealth.go.th/api/data-sync-in"
      SYNC_JOBS_FILE: "/sync/sync-jobs.json"
      SYNC_RUN_ON_START: "true"
      UPDATE_LOG_FILE: "/sync/update_log.json"
    command: sh /sync/entrypoint.sh
    volumes:
      - ./sync:/sync
      - ./webapp/update_log.json:/sync/update_log.json:ro

volumes:
  sub_hdc_mariadb_data:
